apiVersion: v1
kind: Secret
metadata:
  name: quay-config-bundle
  namespace: quay-enterprise
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  # Configuracion principal de Red Hat Quay
  # Referencia completa: https://docs.redhat.com/en/documentation/red_hat_quay/3.16/html-single/configure_red_hat_quay/
  config.yaml: |
    # --- Configuracion general del servidor ---
    FEATURE_USER_CREATION: true
    ENTERPRISE_LOGO_URL: /static/img/quay-horizontal-color.svg
    SERVER_HOSTNAME: registry-quay-quay-enterprise.apps.cluster-pvbjx.dynamic2.redhatworkshops.io

    # --- Superusuario inicial ---
    SUPER_USERS:
      - quayadmin

    # --- Almacenamiento de objetos (cuando objectstorage es unmanaged) ---
    # Descomentar y configurar para produccion con S3:
    # DISTRIBUTED_STORAGE_CONFIG:
    #   s3Storage:
    #     - S3Storage
    #     - host: <S3_ENDPOINT>
    #       s3_access_key: <AWS_ACCESS_KEY_ID>
    #       s3_secret_key: <AWS_SECRET_ACCESS_KEY>
    #       s3_bucket: <STORAGE_BUCKET>
    #       storage_path: /datastorage/registry
    #       s3_region: <AWS_REGION>
    # DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS:
    #   - s3Storage
    # DISTRIBUTED_STORAGE_PREFERENCE:
    #   - s3Storage

    # --- Base de datos externa (cuando postgres es unmanaged) ---
    # Descomentar para produccion:
    # DB_URI: postgresql://<DB_USER>:<DB_PASSWORD>@<DB_HOST>:5432/<DB_NAME>

    # --- Claves de seguridad (OBLIGATORIO cambiar en produccion) ---
    SECRET_KEY: f506ef5c79c826916d649119240d5d62d78cc548992396e9dee451a7789db452
    DATABASE_SECRET_KEY: 74970c62dd6cf7b8189e5a93d6e8ad55d5828d17fc632b0c1208e9ae80e74b5c
